services:
  postgres:
    image: postgres:16-alpine
    container_name: news_scraper_postgres
    environment:
      # BUG FIX: parol əvvəllər bu fayla hardcode edilmişdi ("news555").
      # Docker Compose eyni qovluqdakı .env faylını avtomatik oxuyub bu
      # dəyişənləri əvəz edir — beləliklə parol YALNIZ .env-də (git-ə
      # düşməyən, .gitignore-da olan fayl) saxlanılır, tətbiqin öz DB_*
      # dəyişənləri ilə də HƏMİŞƏ sinxron qalır (ikisi ayrı-ayrı yazılıb
      # təsadüfən fərqli ola bilməzdi).
      POSTGRES_DB: ${DB_NAME:-news_scraper}
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD .env faylında təyin edilməlidir}
    ports:
      - "${DB_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  netdata:
    image: netdata/netdata
    container_name: news_scraper_netdata
    ports:
      - "19999:19999"
    restart: unless-stopped
    cap_add:
      - SYS_PTRACE
      - SYS_ADMIN
    security_opt:
      - apparmor:unconfined
    volumes:
      - netdataconfig:/etc/netdata
      - netdatalib:/var/lib/netdata
      - netdatacache:/var/cache/netdata
      - /etc/passwd:/host/etc/passwd:ro
      - /etc/group:/host/etc/group:ro
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /etc/os-release:/host/etc/os-release:ro

volumes:
  postgres_data:
  netdataconfig:
  netdatalib:
  netdatacache: